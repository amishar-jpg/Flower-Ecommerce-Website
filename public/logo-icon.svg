<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 52" width="36" height="52" fill="none">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g stroke="#22C55E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Stem: subtle organic curve -->
    <path d="M18 50 C18 42 17 32 18 8" fill="none"/>
    <!-- Left leaf: sweeps upper-left, staggered lower on stem -->
    <path d="M18 34 C11 27 2 23 5 12 C7 4 19 22 18 34 Z" fill="none"/>
    <!-- Right leaf: sweeps upper-right, staggered higher on stem -->
    <path d="M18 22 C25 15 34 11 31 2 C28 -5 17 14 18 22 Z" fill="none"/>
  </g>
</svg>
